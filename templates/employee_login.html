{% extends "base.html" %}

{% block content %}
<div class="form-card small-card">
    <h1>Employee Login</h1>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('employee_login_submit') }}" method="post" class="incident-form">
        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <div class="actions">
            <a href="{{ url_for('landing') }}" class="btn secondary">Back</a>
            <button type="submit" class="btn">Login</button>
        </div>
    </form>
</div>
{% endblock %}
